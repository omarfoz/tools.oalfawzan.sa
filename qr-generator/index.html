<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>QR Generator — tools.oalfawzan.sa</title>
<meta name="description" content="مولد QR سريع مع خيار تنزيل الصورة.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Mono:wght@300;400;500&family=Noto+Sans+Arabic:wght@400;500;700;800&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#0a0a0f;--surface:#111118;--border:rgba(255,255,255,.07);--text:#f0f0f5;--muted:#6b6b80;--accent:#007AFF;--green:#00c896;--sans:'Syne',sans-serif;--arabic:'Noto Sans Arabic',sans-serif;--mono:'DM Mono',monospace}
:root[data-theme="light"]{--bg:#f7f8fc;--surface:#ffffff;--border:rgba(16,24,40,.12);--text:#111827;--muted:#667085;--accent:#005fcb;--green:#069c6b}
body{background:var(--bg);color:var(--text);font-family:var(--sans);min-height:100vh}html[lang="ar"] body{font-family:var(--arabic)}
body::before{content:'';position:fixed;inset:0;background:radial-gradient(ellipse at 20% 20%,rgba(0,200,150,.04) 0%,transparent 50%),radial-gradient(ellipse at 80% 80%,rgba(0,122,255,.05) 0%,transparent 50%);pointer-events:none;z-index:0}
.wrap{max-width:920px;margin:0 auto;padding:0 20px 34px;position:relative;z-index:1}
header{padding:24px 0 28px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:10px}.header-actions{display:flex;gap:8px;align-items:center;flex-wrap:wrap}
.logo{font-size:.85rem;font-weight:600;color:var(--muted);text-decoration:none;letter-spacing:.05em}.logo span{color:var(--text)}
.lang-btn,.btn{background:var(--surface);border:1px solid var(--border);border-radius:10px;color:var(--text);padding:0 14px;min-height:44px;cursor:pointer;font-size:.82rem;font-weight:700}.btn.primary{background:rgba(0,122,255,.12);border-color:rgba(0,122,255,.4)}
.hero-tag{display:inline-block;font-family:var(--mono);font-size:.72rem;color:var(--green);border:1px solid rgba(0,200,150,.3);padding:4px 12px;border-radius:4px;margin-bottom:16px;letter-spacing:.08em}
h1{font-size:clamp(1.7rem,7vw,2.7rem);margin-bottom:10px;line-height:1.15}p.sub{font-family:var(--mono);font-size:.82rem;color:var(--muted);line-height:1.7;margin-bottom:18px}
.panel{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:18px;display:grid;grid-template-columns:1fr 320px;gap:16px}
textarea{width:100%;min-height:140px;background:#0d0d13;color:var(--text);border:1px solid var(--border);border-radius:12px;padding:12px;font:400 .9rem/1.6 var(--mono);resize:vertical}
.helper{font-family:var(--mono);font-size:.72rem;color:var(--muted);margin-top:8px}
.qr-box{background:#fff;border-radius:14px;padding:12px;display:flex;align-items:center;justify-content:center;min-height:280px}
canvas{max-width:100%;height:auto}
.actions{display:flex;gap:10px;flex-wrap:wrap;margin-top:12px}
.status{font-size:.8rem;color:var(--green);margin-top:8px;min-height:20px}
footer{text-align:center;padding:26px 0 10px;font-family:var(--mono);font-size:.72rem;color:var(--muted)}
html[dir="rtl"] .header-actions{flex-direction:row-reverse}
@media(max-width:820px){.panel{grid-template-columns:1fr}.qr-box{min-height:240px}}
</style>
</head>
<body>
<div class="wrap">
  <header>
    <a href="/" class="logo">tools.<span>oalfawzan.sa</span></a>
    <div class="header-actions">
      <button class="lang-btn" id="langBtn" type="button">EN</button>
      <button class="lang-btn" id="themeBtn" type="button">☀️</button>
      <a href="/" class="logo" id="backLink">← الرجوع لكل الأدوات</a>
    </div>
  </header>

  <div class="hero-tag" id="tag">// أداة</div>
  <h1 id="title">QR Code Generator</h1>
  <p class="sub" id="desc">اكتب نصًا أو رابطًا، ثم أنشئ رمز QR قابلًا للتنزيل.</p>

  <section class="panel">
    <div>
      <textarea id="qrText" placeholder="https://tools.oalfawzan.sa"></textarea>
      <div class="helper" id="helper">يدعم الروابط والنصوص العادية.</div>
      <div class="actions">
        <button class="btn primary" id="generateBtn" type="button">إنشاء QR</button>
        <button class="btn" id="downloadBtn" type="button">تنزيل PNG</button>
      </div>
      <div class="status" id="status"></div>
    </div>
    <div class="qr-box">
      <canvas id="qrCanvas" width="260" height="260"></canvas>
    </div>
  </section>
  <footer><span id="builtBy">من تطوير</span> <a href="https://oalfawzan.sa" class="logo" style="font-size:.72rem">Omar Alfawzan</a></footer>
</div>
<script src="https://cdn.jsdelivr.net/npm/qrious@4.0.2/dist/qrious.min.js"></script>
<script>
const STRINGS={
  ar:{lang:'ar',dir:'rtl',title:'QR Generator — tools.oalfawzan.sa',meta:'مولد QR سريع مع خيار تنزيل الصورة.',tag:'// أداة',heading:'QR Code Generator',desc:'اكتب نصًا أو رابطًا، ثم أنشئ رمز QR قابلًا للتنزيل.',placeholder:'https://tools.oalfawzan.sa',helper:'يدعم الروابط والنصوص العادية.',generate:'إنشاء QR',download:'تنزيل PNG',back:'← الرجوع لكل الأدوات',builtBy:'من تطوير',langBtn:'EN',themeDark:'🌙',themeLight:'☀️',empty:'يرجى إدخال نص أو رابط أولًا.',ok:'تم إنشاء الرمز بنجاح.'},
  en:{lang:'en',dir:'ltr',title:'QR Generator — tools.oalfawzan.sa',meta:'Fast QR generator with downloadable image.',tag:'// TOOL',heading:'QR Code Generator',desc:'Enter text or URL, generate a QR code, then download it.',placeholder:'https://tools.oalfawzan.sa',helper:'Supports both plain text and URLs.',generate:'Generate QR',download:'Download PNG',back:'← Back to all tools',builtBy:'Built by',langBtn:'عربي',themeDark:'🌙',themeLight:'☀️',empty:'Please enter text or URL first.',ok:'QR code generated successfully.'}
};
const qrText=document.getElementById('qrText');
const statusEl=document.getElementById('status');
const qr=new QRious({element:document.getElementById('qrCanvas'),size:260,value:'https://tools.oalfawzan.sa',background:'white',foreground:'black'});
let currentLang=localStorage.getItem('tools_lang')||'ar';
let currentTheme=localStorage.getItem('tools_theme')||'dark';
function generate(){
  const value=qrText.value.trim();
  if(!value){statusEl.textContent=STRINGS[currentLang].empty;return}
  qr.value=value;statusEl.textContent=STRINGS[currentLang].ok;
}
function download(){
  const value=qrText.value.trim();if(!value){statusEl.textContent=STRINGS[currentLang].empty;return}
  const a=document.createElement('a');a.href=qr.toDataURL('image/png');a.download='qr-code.png';a.click();
}
function applyLang(lang){
  const s=STRINGS[lang]||STRINGS.ar; currentLang=lang;
  document.documentElement.lang=s.lang;document.documentElement.dir=s.dir;document.title=s.title;
  document.querySelector('meta[name="description"]').setAttribute('content',s.meta);
  document.getElementById('tag').textContent=s.tag;document.getElementById('title').textContent=s.heading;
  document.getElementById('desc').textContent=s.desc;qrText.placeholder=s.placeholder;
  document.getElementById('helper').textContent=s.helper;document.getElementById('generateBtn').textContent=s.generate;
  document.getElementById('downloadBtn').textContent=s.download;document.getElementById('backLink').textContent=s.back;
  document.getElementById('builtBy').textContent=s.builtBy;document.getElementById('langBtn').textContent=s.langBtn;
  document.getElementById('themeBtn').textContent=(currentTheme==='light'?s.themeDark:s.themeLight);
  statusEl.textContent='';localStorage.setItem('tools_lang',lang);
}
document.getElementById('generateBtn').addEventListener('click',generate);
document.getElementById('downloadBtn').addEventListener('click',download);
document.getElementById('langBtn').addEventListener('click',()=>applyLang(currentLang==='ar'?'en':'ar'));
function applyTheme(theme){currentTheme=theme==='light'?'light':'dark';document.documentElement.setAttribute('data-theme',currentTheme);localStorage.setItem('tools_theme',currentTheme);document.getElementById('themeBtn').textContent=(currentTheme==='light'?STRINGS[currentLang].themeDark:STRINGS[currentLang].themeLight)}
document.getElementById('themeBtn').addEventListener('click',()=>applyTheme(currentTheme==='dark'?'light':'dark'));
applyTheme(currentTheme);
applyLang(currentLang);
</script>
</body>
</html>

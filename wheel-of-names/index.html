<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Wheel of Names — tools.oalfawzan.sa</title>
<meta name="description" content="عجلة أسماء بسيطة لاختيار اسم عشوائي بسرعة.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Mono:wght@300;400;500&family=Noto+Sans+Arabic:wght@400;500;700;800&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#0a0a0f;--surface:#111118;--border:rgba(255,255,255,.07);--text:#f0f0f5;--muted:#6b6b80;--accent:#007AFF;--green:#00c896;--sans:'Syne',sans-serif;--arabic:'Noto Sans Arabic',sans-serif;--mono:'DM Mono',monospace}
:root[data-theme="light"]{--bg:#f7f8fc;--surface:#ffffff;--border:rgba(16,24,40,.12);--text:#111827;--muted:#667085;--accent:#005fcb;--green:#069c6b}
body{background:var(--bg);color:var(--text);font-family:var(--sans);min-height:100vh;overflow-x:hidden}
html[lang="ar"] body{font-family:var(--arabic)}
body::before{content:'';position:fixed;inset:0;background:radial-gradient(ellipse at 20% 20%,rgba(0,200,150,.04) 0%,transparent 50%),radial-gradient(ellipse at 80% 80%,rgba(0,122,255,.05) 0%,transparent 50%);pointer-events:none;z-index:0}
.wrap{max-width:980px;margin:0 auto;padding:0 20px 34px;position:relative;z-index:1}
header{padding:24px 0 28px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:10px}
.header-actions{display:flex;gap:8px;align-items:center;flex-wrap:wrap}
.logo{font-size:.85rem;font-weight:600;color:var(--muted);text-decoration:none;letter-spacing:.05em}.logo span{color:var(--text)}
.lang-btn,.btn{background:var(--surface);border:1px solid var(--border);border-radius:10px;color:var(--text);padding:0 14px;min-height:44px;cursor:pointer;font-size:.82rem;font-weight:700}
.btn.primary{background:rgba(0,122,255,.12);border-color:rgba(0,122,255,.4)}
.hero-tag{display:inline-block;font-family:var(--mono);font-size:.72rem;color:var(--green);border:1px solid rgba(0,200,150,.3);padding:4px 12px;border-radius:4px;margin-bottom:16px;letter-spacing:.08em}
h1{font-size:clamp(1.7rem,7vw,2.7rem);margin-bottom:10px;line-height:1.15}p.sub{font-family:var(--mono);font-size:.82rem;color:var(--muted);line-height:1.7;margin-bottom:18px}
.grid{display:grid;grid-template-columns:340px 1fr;gap:16px}
.panel{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:16px}
textarea{width:100%;min-height:220px;background:#0d0d13;color:var(--text);border:1px solid var(--border);border-radius:12px;padding:12px;font:400 .9rem/1.6 var(--mono);resize:vertical}
.result{margin-top:14px;font-size:1.05rem;font-weight:700;min-height:30px;color:var(--green)}
.wheel-wrap{display:flex;flex-direction:column;align-items:center;gap:14px}
.pointer{width:0;height:0;border-left:14px solid transparent;border-right:14px solid transparent;border-top:24px solid var(--accent);margin-bottom:-8px;z-index:2}
canvas{width:min(100%,460px);height:auto;background:#0d0d13;border:1px solid var(--border);border-radius:50%}
.actions{display:flex;gap:10px;flex-wrap:wrap}
footer{text-align:center;padding:26px 0 10px;font-family:var(--mono);font-size:.72rem;color:var(--muted)}
a,button{outline:none}a:focus-visible,button:focus-visible,textarea:focus-visible{box-shadow:0 0 0 3px rgba(0,122,255,.35);border-color:rgba(0,122,255,.8)}
html[dir="rtl"] .header-actions{flex-direction:row-reverse}
@media(max-width:820px){.grid{grid-template-columns:1fr}textarea{min-height:170px}}
</style>
</head>
<body>
<div class="wrap">
  <header>
    <a href="/" class="logo">tools.<span>oalfawzan.sa</span></a>
    <div class="header-actions">
      <button class="lang-btn" id="langBtn" type="button">EN</button>
      <button class="lang-btn" id="themeBtn" type="button">☀️</button>
      <a href="/" class="logo" id="backLink">← الرجوع لكل الأدوات</a>
    </div>
  </header>

  <div class="hero-tag" id="tag">// أداة</div>
  <h1 id="title">Wheel of Names</h1>
  <p class="sub" id="desc">أدخل الأسماء (كل اسم في سطر) ثم لف العجلة لاختيار اسم عشوائي.</p>

  <section class="grid">
    <div class="panel">
      <textarea id="namesInput" placeholder="أحمد&#10;سارة&#10;ليلى"></textarea>
      <div class="actions" style="margin-top:12px">
        <button class="btn primary" id="spinBtn" type="button">لف العجلة</button>
        <button class="btn" id="resetBtn" type="button">إعادة تعيين</button>
      </div>
      <div class="result" id="resultText"></div>
    </div>

    <div class="panel wheel-wrap">
      <div class="pointer"></div>
      <canvas id="wheelCanvas" width="460" height="460"></canvas>
    </div>
  </section>

  <footer><span id="builtBy">من تطوير</span> <a href="https://oalfawzan.sa" class="logo" style="font-size:.72rem">Omar Alfawzan</a></footer>
</div>

<script>
const STRINGS={
  ar:{lang:'ar',dir:'rtl',title:'Wheel of Names — tools.oalfawzan.sa',descMeta:'عجلة أسماء بسيطة لاختيار اسم عشوائي بسرعة.',tag:'// أداة',heading:'Wheel of Names',desc:'أدخل الأسماء (كل اسم في سطر) ثم لف العجلة لاختيار اسم عشوائي.',placeholder:'أحمد\nسارة\nليلى',spin:'لف العجلة',reset:'إعادة تعيين',back:'← الرجوع لكل الأدوات',builtBy:'من تطوير',langBtn:'EN',winner:'الاسم المختار: ',themeDark:'🌙',themeLight:'☀️'},
  en:{lang:'en',dir:'ltr',title:'Wheel of Names — tools.oalfawzan.sa',descMeta:'Simple random name picker wheel.',tag:'// TOOL',heading:'Wheel of Names',desc:'Add names (one per line), spin the wheel, and get a random winner.',placeholder:'Alex\nSara\nLina',spin:'Spin',reset:'Reset',back:'← Back to all tools',builtBy:'Built by',langBtn:'عربي',winner:'Selected name: ',themeDark:'🌙',themeLight:'☀️'}
};
const canvas=document.getElementById('wheelCanvas');
const ctx=canvas.getContext('2d');
const namesInput=document.getElementById('namesInput');
const resultText=document.getElementById('resultText');
let rotation=0, spinning=false, currentLang=localStorage.getItem('tools_lang')||'ar', currentTheme=localStorage.getItem('tools_theme')||'dark';
const colors=['#007AFF','#00c896','#7f5af0','#ff8a00','#1f9d9d','#d95f5f','#5aa9ff','#9f86ff'];

function getNames(){return namesInput.value.split('\n').map(v=>v.trim()).filter(Boolean).slice(0,20)}
function drawWheel(){
  const names=getNames();
  const list=names.length?names:['?'];
  const n=list.length; const cx=230, cy=230, r=210;
  ctx.clearRect(0,0,460,460);
  ctx.save();ctx.translate(cx,cy);ctx.rotate(rotation);
  for(let i=0;i<n;i++){
    const a1=(i/n)*Math.PI*2;const a2=((i+1)/n)*Math.PI*2;
    ctx.beginPath();ctx.moveTo(0,0);ctx.arc(0,0,r,a1,a2);ctx.closePath();
    ctx.fillStyle=colors[i%colors.length];ctx.fill();
    ctx.save();ctx.rotate((a1+a2)/2);ctx.textAlign='right';ctx.fillStyle='#fff';ctx.font='600 16px sans-serif';
    ctx.fillText(list[i],r-18,6,130);ctx.restore();
  }
  ctx.beginPath();ctx.arc(0,0,40,0,Math.PI*2);ctx.fillStyle='#0d0d13';ctx.fill();
  ctx.restore();
}

function pickWinner(){
  const names=getNames(); if(names.length<1){resultText.textContent=''; return}
  if(spinning) return;
  spinning=true;
  resultText.textContent='';
  const extra=(Math.random()*Math.PI*2)+(Math.PI*10);
  const start=rotation;const end=rotation+extra;const duration=3600;const t0=performance.now();
  function animate(t){
    const p=Math.min((t-t0)/duration,1); const ease=1-Math.pow(1-p,4);
    rotation=start+(end-start)*ease; drawWheel();
    if(p<1) requestAnimationFrame(animate); else{
      spinning=false;
      const normalized=((Math.PI*1.5-(rotation%(Math.PI*2)))%(Math.PI*2)+(Math.PI*2))%(Math.PI*2);
      const slice=(Math.PI*2)/names.length;
      const idx=Math.floor(normalized/slice)%names.length;
      resultText.textContent=STRINGS[currentLang].winner+names[idx];
    }
  }
  requestAnimationFrame(animate);
}

function resetAll(){rotation=0;resultText.textContent='';drawWheel();}
function applyLang(lang){
  const s=STRINGS[lang]||STRINGS.ar; currentLang=lang;
  document.documentElement.lang=s.lang;document.documentElement.dir=s.dir;document.title=s.title;
  document.querySelector('meta[name="description"]').setAttribute('content',s.descMeta);
  document.getElementById('tag').textContent=s.tag;document.getElementById('title').textContent=s.heading;
  document.getElementById('desc').textContent=s.desc;namesInput.placeholder=s.placeholder;
  document.getElementById('spinBtn').textContent=s.spin;document.getElementById('resetBtn').textContent=s.reset;
  document.getElementById('backLink').textContent=s.back;document.getElementById('builtBy').textContent=s.builtBy;
  document.getElementById('langBtn').textContent=s.langBtn;document.getElementById('themeBtn').textContent=(currentTheme==='light'?s.themeDark:s.themeLight);localStorage.setItem('tools_lang',lang);
}
function applyTheme(theme){currentTheme=theme==='light'?'light':'dark';document.documentElement.setAttribute('data-theme',currentTheme);localStorage.setItem('tools_theme',currentTheme);document.getElementById('themeBtn').textContent=(currentTheme==='light'?STRINGS[currentLang].themeDark:STRINGS[currentLang].themeLight)}

document.getElementById('spinBtn').addEventListener('click',pickWinner);
document.getElementById('resetBtn').addEventListener('click',resetAll);
document.getElementById('langBtn').addEventListener('click',()=>applyLang(currentLang==='ar'?'en':'ar'));
document.getElementById('themeBtn').addEventListener('click',()=>applyTheme(currentTheme==='dark'?'light':'dark'));
namesInput.addEventListener('input',drawWheel);
applyTheme(currentTheme);
applyLang(currentLang);
namesInput.value='';drawWheel();
</script>
</body>
</html>

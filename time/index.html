<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0, maximum-scale=1.0, user-scalable=no">
<script>
(() => {
  let lastTouchEnd = 0;
  document.addEventListener('touchstart', (event) => {
    if (event.touches.length > 1) event.preventDefault();
  }, { passive: false });
  document.addEventListener('touchend', (event) => {
    const now = Date.now();
    if (now - lastTouchEnd <= 300) event.preventDefault();
    lastTouchEnd = now;
  }, { passive: false });
  document.addEventListener('gesturestart', (event) => event.preventDefault());
  document.addEventListener('gesturechange', (event) => event.preventDefault());
  document.addEventListener('gestureend', (event) => event.preventDefault());
})();
</script>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@300;400;500;600;700;800&family=IBM+Plex+Sans+Arabic:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#0a0a0f;--surface:#111118;--surface-soft:#161621;--border:rgba(255,255,255,.1);--text:#f0f0f5;--muted:#8a8aa1;--accent:#007AFF;--green:#00c896;--danger:#ff5f6d;--sans:'IBM Plex Sans',sans-serif;--arabic:'IBM Plex Sans Arabic',sans-serif;--mono:'IBM Plex Sans',sans-serif}
:root[data-theme="light"]{--bg:#f7f8fc;--surface:#ffffff;--surface-soft:#f8f9ff;--border:rgba(16,24,40,.12);--text:#111827;--muted:#667085;--accent:#005fcb;--green:#069c6b;--danger:#d92d20}
body{background:var(--bg);color:var(--text);font-family:var(--sans);min-height:100vh;overflow-x:hidden}
html[lang="ar"] body{font-family:var(--arabic)}
body::before{content:'';position:fixed;inset:0;background:radial-gradient(ellipse at 20% 20%,rgba(0,200,150,.04) 0%,transparent 50%),radial-gradient(ellipse at 80% 80%,rgba(0,122,255,.05) 0%,transparent 50%);pointer-events:none;z-index:0}
.wrap{max-width:1080px;margin:0 auto;padding:0 20px 26px;position:relative;z-index:1}
header{padding:16px 0 16px;display:flex;align-items:center;justify-content:space-between;gap:10px}
.header-actions{display:flex;gap:8px;align-items:center}
.logo{font-size:.85rem;font-weight:600;color:var(--muted);text-decoration:none;letter-spacing:.05em}.logo span{color:var(--text)}
.lang-btn,.btn,input,select{background:var(--surface);border:1px solid var(--border);border-radius:12px;color:var(--text);min-height:42px;font-size:.86rem}
.lang-btn,.btn{padding:0 14px;cursor:pointer;font-weight:700;transition:.2s ease}
.lang-btn:hover,.btn:hover{border-color:rgba(0,122,255,.45)}
.btn.primary{background:rgba(0,122,255,.14);border-color:rgba(0,122,255,.38);box-shadow:inset 0 1px 0 rgba(255,255,255,.1)}
.hero{background:linear-gradient(180deg,rgba(255,255,255,.03),rgba(255,255,255,0));border:1px solid var(--border);border-radius:18px;padding:14px 16px 12px;margin-bottom:14px}
.hero-tag{display:inline-block;font-family:var(--mono);font-size:.69rem;color:var(--green);border:1px solid rgba(0,200,150,.3);padding:3px 10px;border-radius:999px;margin-bottom:10px;letter-spacing:.08em}
h1{font-size:clamp(1.75rem,6vw,2.55rem);margin-bottom:6px;line-height:1.12}
p.sub{font-family:var(--mono);font-size:.8rem;color:var(--muted);line-height:1.65;margin-bottom:0}
.back-link{display:inline-flex;margin-bottom:12px;font-size:.78rem;padding:4px 0}
.grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:10px}
.panel{background:linear-gradient(180deg,var(--surface),var(--surface-soft));border:1px solid var(--border);border-radius:14px;padding:13px;overflow:hidden}
.panel h2{font-size:1rem;margin-bottom:10px;line-height:1.3}
.form-grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:8px}
label{display:flex;flex-direction:column;gap:5px;font-family:var(--mono);font-size:.7rem;font-weight:600;color:var(--muted);letter-spacing:.02em;min-width:0}
input,select{padding:0 10px;font-family:var(--mono);width:100%;max-width:100%;min-width:0;min-inline-size:0;display:block}
input[type="date"],input[type="time"]{-webkit-min-logical-width:0;inline-size:100%;max-inline-size:100%;min-inline-size:0;width:100%!important;min-width:0!important}

.form-grid>*{min-width:0}
select{text-overflow:ellipsis;white-space:nowrap;overflow:hidden}
.actions{display:flex;gap:8px;flex-wrap:wrap;margin-top:10px}
.actions .btn{width:100%}
.result{margin-top:9px;padding:10px 11px;border:1px solid var(--border);background:rgba(0,0,0,.1);border-radius:10px;font-family:var(--mono);font-size:.77rem;line-height:1.6;min-height:52px;word-break:break-word;display:flex;align-items:flex-start}
.result[data-empty="true"]{color:var(--muted);border-style:dashed;background:transparent}
.result.error{border-color:rgba(255,95,109,.55);color:var(--danger)}
footer{text-align:center;padding:22px 0 8px;font-family:var(--mono);font-size:.72rem;color:var(--muted)}
html[dir="rtl"] .header-actions{flex-direction:row-reverse}
@media(max-width:980px){.grid,.form-grid{grid-template-columns:1fr}}
@media(max-width:640px){
  .wrap{padding:0 12px 22px}
  header{padding:12px 0 10px}
  .header-actions{gap:6px}
  .lang-btn{min-width:56px;min-height:38px;font-size:.8rem;padding:0 11px}
  .logo{font-size:.8rem;overflow-wrap:anywhere}
  .hero{padding:12px 12px 11px;border-radius:15px;margin-bottom:10px}
  .panel{padding:11px;border-radius:12px}
  input,select{font-size:.8rem;min-height:40px}
  .btn{min-height:40px;font-size:.82rem}
  h1{font-size:1.56rem}
  .grid{gap:9px}
  .back-link{margin-bottom:8px}
}
</style>

<body>
<div class="wrap">
<header>
  <a href="/" class="logo">tools.<span>oalfawzan.sa</span></a>
  <div class="header-actions">
    <button class="lang-btn" id="langBtn" type="button">EN</button>
    <button class="lang-btn" id="themeBtn" type="button">☀️</button>
  </div>
</header>
<a href="/" class="logo back-link" id="backLink">← الرجوع لكل الأدوات</a>
<section class="hero">
  <div class="hero-tag" id="tag">// أداة وقت</div>
  <h1 id="title">عدة الوقت والتقويم</h1>
  <p class="sub" id="desc">حوّل الوقت بين المدن، احسب فرق الأيام، وحوّل بين الهجري والميلادي بسرعة.</p>
</section>
<section class="grid">
  <article class="panel">
    <h2 id="tzHeading">تحويل الوقت بين المناطق</h2>
    <div class="form-grid">
      <label><span id="dateLabel">التاريخ</span><input type="date" id="tzDate"></label>
      <label><span id="timeLabel">الوقت</span><input type="time" id="tzTime" value="12:00"></label>
      <label><span id="fromLabel">من منطقة</span><select id="fromZone"></select></label>
      <label><span id="toLabel">إلى منطقة</span><select id="toZone"></select></label>
    </div>
    <div class="actions"><button class="btn primary" id="convertTimeBtn" type="button">تحويل الوقت</button></div>
    <div class="result" id="tzResult" data-empty="true"></div>
  </article>

  <article class="panel">
    <h2 id="daysHeading">حاسبة الأيام</h2>
    <div class="form-grid">
      <label><span id="startLabel">من تاريخ</span><input type="date" id="startDate"></label>
      <label><span id="endLabel">إلى تاريخ</span><input type="date" id="endDate"></label>
    </div>
    <div class="actions"><button class="btn primary" id="calcDaysBtn" type="button">احسب الفرق</button></div>
    <div class="result" id="daysResult" data-empty="true"></div>
  </article>

  <article class="panel">
    <h2 id="durationHeading">المدة بين وقتين</h2>
    <div class="form-grid">
      <label><span id="durationStartLabel">من وقت</span><input type="time" id="durationStart" value="05:00"></label>
      <label><span id="durationEndLabel">إلى وقت</span><input type="time" id="durationEnd" value="12:00"></label>
    </div>
    <div class="actions"><button class="btn primary" id="durationBtn" type="button">احسب المدة</button></div>
    <div class="result" id="durationResult" data-empty="true"></div>
  </article>

  <article class="panel">
    <h2 id="addHoursHeading">إضافة ساعات إلى وقت</h2>
    <div class="form-grid">
      <label><span id="baseTimeLabel">الوقت الحالي</span><input type="time" id="baseTime" value="04:00"></label>
      <label><span id="hoursToAddLabel">عدد الساعات</span>
        <select id="hoursToAdd">
          <option value="1">1</option>
          <option value="2">2</option>
          <option value="3" selected>3</option>
          <option value="4">4</option>
          <option value="6">6</option>
          <option value="8">8</option>
          <option value="12">12</option>
        </select>
      </label>
    </div>
    <div class="actions"><button class="btn primary" id="addHoursBtn" type="button">احسب الوقت الجديد</button></div>
    <div class="result" id="addHoursResult" data-empty="true"></div>
  </article>

  <article class="panel">
    <h2 id="h2gHeading">تحويل هجري → ميلادي</h2>
    <div class="form-grid">
      <label><span id="hyLabel">سنة هجرية</span><input type="number" id="hYear" min="1" value="1446"></label>
      <label><span id="hmLabel">شهر هجري</span><input type="number" id="hMonth" min="1" max="12" value="9"></label>
      <label><span id="hdLabel">يوم هجري</span><input type="number" id="hDay" min="1" max="30" value="1"></label>
    </div>
    <div class="actions"><button class="btn primary" id="h2gBtn" type="button">حوّل لميلادي</button></div>
    <div class="result" id="h2gResult" data-empty="true"></div>
  </article>

  <article class="panel">
    <h2 id="g2hHeading">تحويل ميلادي → هجري</h2>
    <div class="form-grid">
      <label><span id="gDateLabel">التاريخ الميلادي</span><input type="date" id="gDate"></label>
    </div>
    <div class="actions"><button class="btn primary" id="g2hBtn" type="button">حوّل لهجري</button></div>
    <div class="result" id="g2hResult" data-empty="true"></div>
  </article>
</section>
<footer><span id="builtBy">من تطوير</span> <a href="https://oalfawzan.sa" class="logo" style="font-size:.72rem">Omar Alfawzan</a></footer>
</div>
<script>
const STRINGS={
  ar:{lang:'ar',dir:'rtl',title:'عدة الوقت والتقويم — tools.oalfawzan.sa',meta:'تحويل الوقت بين المناطق الزمنية، حساب الفترات بين الأوقات، وجمع الساعات بسرعة.',tag:'// أداة وقت',heading:'عدة الوقت والتقويم',desc:'حوّل الوقت بين المدن، احسب فرق الوقت بين ساعتين، وأضف ساعات إلى أي وقت بسرعة.',tzHeading:'تحويل الوقت بين المناطق',date:'التاريخ',time:'الوقت',from:'من منطقة',to:'إلى منطقة',convertTime:'تحويل الوقت',daysHeading:'حاسبة الأيام',start:'من تاريخ',end:'إلى تاريخ',calcDays:'احسب الفرق',durationHeading:'المدة بين وقتين',durationStart:'من وقت',durationEnd:'إلى وقت',calcDuration:'احسب المدة',addHoursHeading:'إضافة ساعات إلى وقت',baseTime:'الوقت الحالي',hoursToAdd:'عدد الساعات',calcAddHours:'احسب الوقت الجديد',h2gHeading:'تحويل هجري → ميلادي',hy:'سنة هجرية',hm:'شهر هجري',hd:'يوم هجري',h2g:'حوّل لميلادي',g2hHeading:'تحويل ميلادي → هجري',gDate:'التاريخ الميلادي',g2h:'حوّل لهجري',back:'← الرجوع لكل الأدوات',builtBy:'من تطوير',langBtn:'EN',themeDark:'🌙',themeLight:'☀️',badInput:'تحقق من المدخلات أولًا.',emptyResult:'ستظهر النتيجة هنا بعد الحساب.',daysResult:'الفرق: {days} يوم (حوالي {weeks} أسبوع و {rest} يوم).',durationResult:'الفرق بين {start} و {end}: {hours} ساعة و {minutes} دقيقة.',addHoursResult:'بعد {hours} ساعة من {start} سيكون الوقت: {time}.',tzResult:'{date} — الوقت في {to}: {time}',h2gResult:'التاريخ الميلادي: {date}',g2hResult:'التاريخ الهجري: {date}'},
  en:{lang:'en',dir:'ltr',title:'Time Toolkit — tools.oalfawzan.sa',meta:'Convert time zones, calculate time durations, and quickly add hours to any time.',tag:'// TIME TOOL',heading:'Time Toolkit',desc:'Convert time between cities, calculate durations between times, and add hours instantly.',tzHeading:'Time Zone Converter',date:'Date',time:'Time',from:'From Zone',to:'To Zone',convertTime:'Convert Time',daysHeading:'Days Calculator',start:'Start Date',end:'End Date',calcDays:'Calculate',durationHeading:'Duration Between Two Times',durationStart:'Start Time',durationEnd:'End Time',calcDuration:'Calculate Duration',addHoursHeading:'Add Hours to Time',baseTime:'Current Time',hoursToAdd:'Hours to Add',calcAddHours:'Calculate New Time',h2gHeading:'Hijri → Gregorian',hy:'Hijri Year',hm:'Hijri Month',hd:'Hijri Day',h2g:'Convert to Gregorian',g2hHeading:'Gregorian → Hijri',gDate:'Gregorian Date',g2h:'Convert to Hijri',back:'← Back to all tools',builtBy:'Built by',langBtn:'عربي',themeDark:'🌙',themeLight:'☀️',badInput:'Please check your inputs first.',emptyResult:'Your result will appear here after calculation.',daysResult:'Difference: {days} days (about {weeks} weeks and {rest} days).',durationResult:'Difference between {start} and {end}: {hours}h {minutes}m.',addHoursResult:'After {hours} hour(s) from {start}, the time will be: {time}.',tzResult:'{date} — time in {to}: {time}',h2gResult:'Gregorian date: {date}',g2hResult:'Hijri date: {date}'}
};

const ZONES=[
  {value:'Asia/Riyadh',ar:'الرياض',en:'Riyadh'},
  {value:'Asia/Dubai',ar:'دبي',en:'Dubai'},
  {value:'Asia/Qatar',ar:'الدوحة',en:'Doha'},
  {value:'Asia/Kuwait',ar:'الكويت',en:'Kuwait'},
  {value:'Asia/Bahrain',ar:'البحرين',en:'Bahrain'},
  {value:'Africa/Cairo',ar:'القاهرة',en:'Cairo'},
  {value:'Europe/London',ar:'لندن',en:'London'},
  {value:'Europe/Paris',ar:'باريس',en:'Paris'},
  {value:'America/New_York',ar:'نيويورك',en:'New York'},
  {value:'America/Los_Angeles',ar:'لوس أنجلوس',en:'Los Angeles'},
  {value:'Asia/Tokyo',ar:'طوكيو',en:'Tokyo'},
  {value:'UTC',ar:'التوقيت العالمي UTC',en:'UTC'}
];

let currentLang=localStorage.getItem('tools_lang')||'ar';
let currentTheme=localStorage.getItem('tools_theme')||'dark';
const tzDate=document.getElementById('tzDate');
const tzTime=document.getElementById('tzTime');
const fromZone=document.getElementById('fromZone');
const toZone=document.getElementById('toZone');

function populateZones(){
  const opts=ZONES.map(z=>`<option value="${z.value}">${currentLang==='ar'?z.ar:z.en} (${z.value})</option>`).join('');
  const fromValue=fromZone.value||'Asia/Riyadh';
  const toValue=toZone.value||'UTC';
  fromZone.innerHTML=opts;toZone.innerHTML=opts;
  fromZone.value=fromValue;toZone.value=toValue;
}

function formatInZone(ms,tz,lang){
  return new Intl.DateTimeFormat(lang==='ar'?'ar-SA':'en-GB',{timeZone:tz,year:'numeric',month:'2-digit',day:'2-digit',hour:'2-digit',minute:'2-digit',hour12:false}).format(new Date(ms));
}
function zoneOffsetMinutes(ms,tz){
  const p=new Intl.DateTimeFormat('en-GB',{timeZone:tz,hour12:false,year:'numeric',month:'2-digit',day:'2-digit',hour:'2-digit',minute:'2-digit',second:'2-digit'}).formatToParts(new Date(ms));
  const g=t=>+p.find(x=>x.type===t).value;
  const asUTC=Date.UTC(g('year'),g('month')-1,g('day'),g('hour'),g('minute'),g('second'));
  return (asUTC-ms)/60000;
}
function zonedToUtcMs(dateStr,timeStr,tz){
  const [y,m,d]=dateStr.split('-').map(Number);
  const [hh,mm]=timeStr.split(':').map(Number);
  let ms=Date.UTC(y,m-1,d,hh,mm,0);
  for(let i=0;i<4;i++){ms=Date.UTC(y,m-1,d,hh,mm,0)-zoneOffsetMinutes(ms,tz)*60000}
  return ms;
}

function setResult(id,msg,isError=false){
  const el=document.getElementById(id);
  el.classList.toggle('error',isError);
  el.dataset.empty=msg? 'false':'true';
  el.textContent=msg;
}

function convertTime(){
  if(!tzDate.value||!tzTime.value){setResult('tzResult',STRINGS[currentLang].badInput,true);return;}
  try{
    const utcMs=zonedToUtcMs(tzDate.value,tzTime.value,fromZone.value);
    const target=formatInZone(utcMs,toZone.value,currentLang);
    const zoneName=toZone.options[toZone.selectedIndex]?.textContent||toZone.value;
    setResult('tzResult',STRINGS[currentLang].tzResult.replace('{date}',`${tzDate.value} ${tzTime.value}`).replace('{to}',zoneName).replace('{time}',target));
  }catch(e){setResult('tzResult',STRINGS[currentLang].badInput,true)}
}

function calcDays(){
  const a=document.getElementById('startDate').value;
  const b=document.getElementById('endDate').value;
  if(!a||!b){setResult('daysResult',STRINGS[currentLang].badInput,true);return;}
  const d1=new Date(`${a}T00:00:00Z`);
  const d2=new Date(`${b}T00:00:00Z`);
  const days=Math.abs(Math.round((d2-d1)/86400000));
  const weeks=Math.floor(days/7);
  setResult('daysResult',STRINGS[currentLang].daysResult.replace('{days}',days).replace('{weeks}',weeks).replace('{rest}',days%7));
}

function parseMinutes(timeValue){
  const [hours,minutes]=timeValue.split(':').map(Number);
  return hours*60+minutes;
}

function formatMinutes(totalMinutes){
  const wrapped=((totalMinutes%1440)+1440)%1440;
  const hours=Math.floor(wrapped/60);
  const minutes=wrapped%60;
  return `${pad(hours)}:${pad(minutes)}`;
}

function calcDuration(){
  const start=document.getElementById('durationStart').value;
  const end=document.getElementById('durationEnd').value;
  if(!start||!end){setResult('durationResult',STRINGS[currentLang].badInput,true);return;}
  let diff=parseMinutes(end)-parseMinutes(start);
  if(diff<0){diff+=1440;}
  const hours=Math.floor(diff/60);
  const minutes=diff%60;
  setResult('durationResult',STRINGS[currentLang].durationResult.replace('{start}',start).replace('{end}',end).replace('{hours}',hours).replace('{minutes}',minutes));
}

function calcAddedHours(){
  const start=document.getElementById('baseTime').value;
  const hoursToAdd=Number(document.getElementById('hoursToAdd').value);
  if(!start||!Number.isFinite(hoursToAdd)){setResult('addHoursResult',STRINGS[currentLang].badInput,true);return;}
  const resultTime=formatMinutes(parseMinutes(start)+hoursToAdd*60);
  setResult('addHoursResult',STRINGS[currentLang].addHoursResult.replace('{hours}',hoursToAdd).replace('{start}',start).replace('{time}',resultTime));
}

function islamicToJD(y,m,d){return d+Math.ceil(29.5*(m-1))+(y-1)*354+Math.floor((3+11*y)/30)+1948439.5-1}
function jdToGregorian(jd){const z=Math.floor(jd+0.5);let a=z;const alpha=Math.floor((a-1867216.25)/36524.25);a+=1+alpha-Math.floor(alpha/4);const b=a+1524;const c=Math.floor((b-122.1)/365.25);const d=Math.floor(365.25*c);const e=Math.floor((b-d)/30.6001);return {day:b-d-Math.floor(30.6001*e),month:e<14?e-1:e-13,year:(e<14?e-1:e-13)>2?c-4716:c-4715}}
function gregorianToJD(y,m,d){const a=Math.floor((14-m)/12);const y2=y+4800-a;const m2=m+12*a-3;return d+Math.floor((153*m2+2)/5)+365*y2+Math.floor(y2/4)-Math.floor(y2/100)+Math.floor(y2/400)-32045}
function jdToIslamic(jd){jd=Math.floor(jd)+0.5;const year=Math.floor((30*(jd-1948439.5)+10646)/10631);const month=Math.min(12,Math.ceil((jd-(29+islamicToJD(year,1,1)))/29.5)+1);return {year,month,day:Math.floor(jd-islamicToJD(year,month,1)+1)}}
function pad(n){return String(n).padStart(2,'0')}

function convertH2G(){
  const y=+document.getElementById('hYear').value,m=+document.getElementById('hMonth').value,d=+document.getElementById('hDay').value;
  if(!y||m<1||m>12||d<1||d>30){setResult('h2gResult',STRINGS[currentLang].badInput,true);return;}
  const g=jdToGregorian(islamicToJD(y,m,d));
  setResult('h2gResult',STRINGS[currentLang].h2gResult.replace('{date}',`${g.year}-${pad(g.month)}-${pad(g.day)}`));
}
function convertG2H(){
  const gd=document.getElementById('gDate').value;
  if(!gd){setResult('g2hResult',STRINGS[currentLang].badInput,true);return;}
  const [y,m,d]=gd.split('-').map(Number);
  const h=jdToIslamic(gregorianToJD(y,m,d)-0.5);
  setResult('g2hResult',STRINGS[currentLang].g2hResult.replace('{date}',`${h.year}-${pad(h.month)}-${pad(h.day)}`));
}

function applyLang(lang){
  const s=STRINGS[lang]||STRINGS.ar;currentLang=lang;
  document.documentElement.lang=s.lang;document.documentElement.dir=s.dir;document.title=s.title;
  document.querySelector('meta[name="description"]').setAttribute('content',s.meta);
  document.getElementById('tag').textContent=s.tag;document.getElementById('title').textContent=s.heading;document.getElementById('desc').textContent=s.desc;
  document.getElementById('tzHeading').textContent=s.tzHeading;document.getElementById('dateLabel').textContent=s.date;document.getElementById('timeLabel').textContent=s.time;
  document.getElementById('fromLabel').textContent=s.from;document.getElementById('toLabel').textContent=s.to;document.getElementById('convertTimeBtn').textContent=s.convertTime;
  document.getElementById('daysHeading').textContent=s.daysHeading;document.getElementById('startLabel').textContent=s.start;document.getElementById('endLabel').textContent=s.end;document.getElementById('calcDaysBtn').textContent=s.calcDays;document.getElementById('durationHeading').textContent=s.durationHeading;document.getElementById('durationStartLabel').textContent=s.durationStart;document.getElementById('durationEndLabel').textContent=s.durationEnd;document.getElementById('durationBtn').textContent=s.calcDuration;document.getElementById('addHoursHeading').textContent=s.addHoursHeading;document.getElementById('baseTimeLabel').textContent=s.baseTime;document.getElementById('hoursToAddLabel').textContent=s.hoursToAdd;document.getElementById('addHoursBtn').textContent=s.calcAddHours;
  document.getElementById('h2gHeading').textContent=s.h2gHeading;document.getElementById('hyLabel').textContent=s.hy;document.getElementById('hmLabel').textContent=s.hm;document.getElementById('hdLabel').textContent=s.hd;document.getElementById('h2gBtn').textContent=s.h2g;
  document.getElementById('g2hHeading').textContent=s.g2hHeading;document.getElementById('gDateLabel').textContent=s.gDate;document.getElementById('g2hBtn').textContent=s.g2h;
  document.getElementById('backLink').textContent=s.back;document.getElementById('builtBy').textContent=s.builtBy;
  document.getElementById('langBtn').textContent=s.langBtn;document.getElementById('themeBtn').textContent=(currentTheme==='light'?s.themeDark:s.themeLight);
  populateZones();
  initResultPlaceholders();
  localStorage.setItem('tools_lang',lang);
}
function applyTheme(theme){currentTheme=theme==='light'?'light':'dark';document.documentElement.setAttribute('data-theme',currentTheme);localStorage.setItem('tools_theme',currentTheme);document.getElementById('themeBtn').textContent=(currentTheme==='light'?STRINGS[currentLang].themeDark:STRINGS[currentLang].themeLight)}


function initResultPlaceholders(){
  const placeholder=STRINGS[currentLang].emptyResult;
  document.querySelectorAll('.result').forEach((el)=>{
    if(!el.textContent.trim()){
      el.textContent=placeholder;
      el.dataset.empty='true';
    }
  });
}

document.getElementById('convertTimeBtn').addEventListener('click',convertTime);
document.getElementById('calcDaysBtn').addEventListener('click',calcDays);
document.getElementById('durationBtn').addEventListener('click',calcDuration);
document.getElementById('addHoursBtn').addEventListener('click',calcAddedHours);
document.getElementById('h2gBtn').addEventListener('click',convertH2G);
document.getElementById('g2hBtn').addEventListener('click',convertG2H);
document.getElementById('langBtn').addEventListener('click',()=>applyLang(currentLang==='ar'?'en':'ar'));
document.getElementById('themeBtn').addEventListener('click',()=>applyTheme(currentTheme==='dark'?'light':'dark'));

const today=new Date().toISOString().slice(0,10);
tzDate.value=today;document.getElementById('gDate').value=today;
applyTheme(currentTheme);
applyLang(currentLang);
</script>
